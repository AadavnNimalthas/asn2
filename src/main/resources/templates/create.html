<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head('Add New Rating')}"></head>
<body>
    <nav th:replace="~{fragments :: nav}"></nav>
    <div class="container">
        <div class="card" style="max-width: 600px; margin: 0 auto;">
            <h1 class="page-title">Add New Rating</h1>
            <form th:action="@{/ratings}" th:object="${staffRating}" method="post">
                <div class="form-group">
                    <label for="name" class="form-label">Name *</label>
                    <input type="text" id="name" th:field="*{name}" class="form-control" placeholder="John Doe">
                    <span th:if="${#fields.hasErrors('name')}" th:errors="*{name}" class="text-danger"></span>
                </div>
                
                <div class="form-group">
                    <label for="email" class="form-label">Email *</label>
                    <input type="email" id="email" th:field="*{email}" class="form-control" placeholder="john@example.com">
                    <span th:if="${#fields.hasErrors('email')}" th:errors="*{email}" class="text-danger"></span>
                </div>
                
                <div class="form-group">
                    <label for="roleType" class="form-label">Role Type *</label>
                    <select id="roleType" th:field="*{roleType}" class="form-control">
                        <option value="">Select a role...</option>
                        <option value="TA">Teaching Assistant (TA)</option>
                        <option value="PROF">Professor</option>
                        <option value="INSTRUCTOR">Instructor</option>
                        <option value="STAFF">Staff Member</option>
                    </select>
                    <span th:if="${#fields.hasErrors('roleType')}" th:errors="*{roleType}" class="text-danger"></span>
                </div>
                
                <div class="form-group">
                    <label for="clarity" class="form-label">Clarity (1-10) *</label>
                    <input type="number" id="clarity" th:field="*{clarity}" class="form-control" min="1" max="10">
                    <span th:if="${#fields.hasErrors('clarity')}" th:errors="*{clarity}" class="text-danger"></span>
                </div>
                
                <div class="form-group">
                    <label for="niceness" class="form-label">Niceness (1-10) *</label>
                    <input type="number" id="niceness" th:field="*{niceness}" class="form-control" min="1" max="10">
                    <span th:if="${#fields.hasErrors('niceness')}" th:errors="*{niceness}" class="text-danger"></span>
                </div>
                
                <div class="form-group">
                    <label for="knowledgeableScore" class="form-label">Knowledge (1-10) *</label>
                    <input type="number" id="knowledgeableScore" th:field="*{knowledgeableScore}" class="form-control" min="1" max="10">
                    <span th:if="${#fields.hasErrors('knowledgeableScore')}" th:errors="*{knowledgeableScore}" class="text-danger"></span>
                </div>
                
                <div class="form-group">
                    <label for="comment" class="form-label">Comment</label>
                    <textarea id="comment" th:field="*{comment}" class="form-control" rows="4" placeholder="Optional comments..."></textarea>
                    <span th:if="${#fields.hasErrors('comment')}" th:errors="*{comment}" class="text-danger"></span>
                </div>
                
                <div class="actions">
                    <button type="submit" class="btn btn-primary">Submit Rating</button>
                    <a th:href="@{/}" class="btn btn-secondary">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
